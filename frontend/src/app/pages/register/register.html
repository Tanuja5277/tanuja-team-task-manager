<div class="min-h-screen flex items-center justify-center bg-gray-900">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-[400px]">

        <h1 class="text-3xl font-bold text-white text-center mb-6">
            Create Account
        </h1>

        <form class="space-y-5" (ngSubmit)="register()">

            <!-- NAME -->

            <div>

                <label class="text-white block mb-2">
                    Name
                </label>

                <input
                    type="text"
                    placeholder="Enter name"
                    [(ngModel)]="formData.name"
                    name="name"
                    required
                    class="w-full p-3 rounded-lg bg-gray-700 text-white outline-none"
                >

            </div>


            <!-- EMAIL -->

            <div>

                <label class="text-white block mb-2">
                    Email
                </label>

                <input
                    type="email"
                    placeholder="Enter email"
                    [(ngModel)]="formData.email"
                    name="email"
                    required
                    class="w-full p-3 rounded-lg bg-gray-700 text-white outline-none"
                >

            </div>


            <!-- PASSWORD -->

            <div>

                <label class="text-white block mb-2">
                    Password
                </label>

                <input
                    type="password"
                    placeholder="Enter password"
                    [(ngModel)]="formData.password"
                    name="password"
                    required
                    class="w-full p-3 rounded-lg bg-gray-700 text-white outline-none"
                >

            </div>


            <!-- BUTTON -->

            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold transition duration-300"
            >
                Register
            </button>

        </form>


        <!-- LOGIN LINK -->

        <p class="text-gray-400 text-center mt-5">

            Already have an account?

            <a
                routerLink="/"
                class="text-blue-400 cursor-pointer"
            >
                Login
            </a>

        </p>

    </div>

</div>
